name: cycle02
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # --- Core Data Stack ---
  - numpy
  - pandas
  - polars
  - scikit-learn
  - matplotlib-base
  - seaborn
  - scipy
  - pyyaml           # Để đọc configs/config.yaml
  - python-dotenv    # Để quản lý biến môi trường
  - imbalanced-learn # Cực kỳ cần thiết cho bài toán Churn (xử lý lệch dữ liệu)
  # --- Bridge between Vim and Python ---
  - ipykernel    # BẮT BUỘC: Để LazyVim (qua Molten/Iron) kết nối vào môi trường này
  - debugpy      # Khuyên dùng: Để debugger của Neovim hoạt động mượt mà nhất
  - pip:
    - plotly     # Cho visualization xịn xò
    - tqdm       # Thanh tiến trình
